name: Build Kernel CI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-kernel:
    name: "${{ matrix.variant == 'stock' && format('{0}-{1}', matrix.variant, matrix.hz.name) || format('{0}-{1}-{2}', matrix.variant, matrix.root, matrix.hz.name) }}${{ matrix.kpm == 'on' && '-kpm' || '' }}${{ matrix.hardened == 'on' && '-hardened' || '' }}"
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        hz: 
          - { id: 100, name: powersave }
          - { id: 250, name: balance }
          - { id: 500, name: performance }
          - { id: 1000, name: ultra-performance }
        variant: [stock, root, susfs]
        root: [none, ksu-next, sukisu, resukisu, mambosu]
        kpm: [off, on]
        hardened: [off, on]
        exclude:
          - variant: stock
            root: ksu-next
          - variant: stock
            root: sukisu
          - variant: stock
            root: resukisu
          - variant: stock
            root: mambosu
          - variant: root
            root: none
          - variant: susfs
            root: none
          - variant: stock
            kpm: on
          - variant: root
            root: ksu-next
            kpm: on
          - variant: root
            root: mambosu
            kpm: on
          - variant: susfs
            root: ksu-next
            kpm: on
          - variant: susfs
            root: mambosu
            kpm: on
      fail-fast: false

    steps:
      - name: Create Swap
        run: |
          SWAPFILE="/mnt/build_swapfile"
          while true; do
            if sudo fallocate -l 10G $SWAPFILE || sudo dd if=/dev/zero of=$SWAPFILE bs=1M count=10240 status=progress; then
              break
            else
              sleep 5
            fi
          done
          sudo chmod 600 $SWAPFILE && sudo mkswap $SWAPFILE && sudo swapon $SWAPFILE

      - uses: actions/checkout@v4
        with: { path: gki-clo }

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 clang lld llvm jq

      - name: Download Clang Toolchain
        run: |
          mkdir -p toolchains
          git clone --depth=1 https://github.com/ZyCromerZ/Clang.git -b main toolchains/clang

      - name: Setup AnyKernel3
        run: |
          cd gki-clo
          [ ! -d "anykernel" ] && git clone https://github.com/osm0sis/AnyKernel3.git anykernel || true

      - name: Build Kernel
        run: |
          cd gki-clo
          chmod +x build.sh
          ./build.sh \
            hz=${{ matrix.hz.id }} \
            variant=${{ matrix.variant }} \
            root=${{ matrix.root }} \
            kpm=${{ matrix.kpm }} \
            kpm_superkey=${{ matrix.kpm == 'on' && secrets.KPM_SUPERKEY || '' }} \
            kpm_patch=${{ matrix.kpm == 'on' && matrix.root == 'resukisu' && 'off' || 'on' }} \
            hardened=${{ matrix.hardened }} \
            lto=${{ matrix.kpm == 'on' && 'thin' || 'full' }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kono-Ha-${{ matrix.variant == 'stock' && format('{0}-{1}', matrix.variant, matrix.hz.name) || format('{0}-{1}-{2}', matrix.variant, matrix.root, matrix.hz.name) }}${{ matrix.kpm == 'on' && '-kpm' || '' }}${{ matrix.hardened == 'on' && '-hardened' || '' }}
          path: gki-clo/Kono-Ha-Release
          retention-days: 7

  release:
    needs: build-kernel
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \; || true
          find artifacts -type f -name "*.img" -exec mv {} release_assets/ \; || true

      - name: Generate Release Body
        run: |
          TAG="build-${{ github.run_number }}-${{ github.sha }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"
          
          cat << EOF > release_body.md
          Automated kernel build.
          Commit: ${{ github.sha }}
          Ref: ${{ github.ref }}

          ### Standard / Root Builds
          | Variant | Powersave | Balance | Performance | Ultra-Performance |
          |---|---|---|---|---|
          | **Stock** | [stock-powersave] | [stock-balance] | [stock-performance] | [stock-ultra-performance] |
          | **KernelSU Next** | [root-ksu-next-powersave] | [root-ksu-next-balance] | [root-ksu-next-performance] | [root-ksu-next-ultra-performance] |
          | **Sukisu** | [root-sukisu-powersave] | [root-sukisu-balance] | [root-sukisu-performance] | [root-sukisu-ultra-performance] |
          | **Sukisu + KPM** | [root-sukisu-powersave-kpm] | [root-sukisu-balance-kpm] | [root-sukisu-performance-kpm] | [root-sukisu-ultra-performance-kpm] |
          | **Resukisu** | [root-resukisu-powersave] | [root-resukisu-balance] | [root-resukisu-performance] | [root-resukisu-ultra-performance] |
          | **Resukisu + KPM** | [root-resukisu-powersave-kpm] | [root-resukisu-balance-kpm] | [root-resukisu-performance-kpm] | [root-resukisu-ultra-performance-kpm] |
          | **Mambosu** | [root-mambosu-powersave] | [root-mambosu-balance] | [root-mambosu-performance] | [root-mambosu-ultra-performance] |

          ### SUSFS ඞ
          | Variant | Powersave | Balance | Performance | Ultra-Performance |
          |---|---|---|---|---|
          | **KernelSU Next** | [susfs-ksu-next-powersave] | [susfs-ksu-next-balance] | [susfs-ksu-next-performance] | [susfs-ksu-next-ultra-performance] |
          | **Sukisu** | [susfs-sukisu-powersave] | [susfs-sukisu-balance] | [susfs-sukisu-performance] | [susfs-sukisu-ultra-performance] |
          | **Sukisu + KPM** | [susfs-sukisu-powersave-kpm] | [susfs-sukisu-balance-kpm] | [susfs-sukisu-performance-kpm] | [susfs-sukisu-ultra-performance-kpm] |
          | **Resukisu** | [susfs-resukisu-powersave] | [susfs-resukisu-balance] | [susfs-resukisu-performance] | [susfs-resukisu-ultra-performance] |
          | **Resukisu + KPM** | [susfs-resukisu-powersave-kpm] | [susfs-resukisu-balance-kpm] | [susfs-resukisu-performance-kpm] | [susfs-resukisu-ultra-performance-kpm] |
          | **Mambosu** | [susfs-mambosu-powersave] | [susfs-mambosu-balance] | [susfs-mambosu-performance] | [susfs-mambosu-ultra-performance] |

          ### Hardened
          | Variant | Powersave | Balance | Performance | Ultra-Performance |
          |---|---|---|---|---|
          | **Stock** | [stock-powersave-hardened] | [stock-balance-hardened] | [stock-performance-hardened] | [stock-ultra-performance-hardened] |
          | **KernelSU Next** | [root-ksu-next-powersave-hardened] | [root-ksu-next-balance-hardened] | [root-ksu-next-performance-hardened] | [root-ksu-next-ultra-performance-hardened] |
          | **Sukisu** | [root-sukisu-powersave-hardened] | [root-sukisu-balance-hardened] | [root-sukisu-performance-hardened] | [root-sukisu-ultra-performance-hardened] |
          | **Sukisu + KPM** | [root-sukisu-powersave-kpm-hardened] | [root-sukisu-balance-kpm-hardened] | [root-sukisu-performance-kpm-hardened] | [root-sukisu-ultra-performance-kpm-hardened] |
          | **Resukisu** | [root-resukisu-powersave-hardened] | [root-resukisu-balance-hardened] | [root-resukisu-performance-hardened] | [root-resukisu-ultra-performance-hardened] |
          | **Resukisu + KPM** | [root-resukisu-powersave-kpm-hardened] | [root-resukisu-balance-kpm-hardened] | [root-resukisu-performance-kpm-hardened] | [root-resukisu-ultra-performance-kpm-hardened] |
          | **Mambosu** | [root-mambosu-powersave-hardened] | [root-mambosu-balance-hardened] | [root-mambosu-performance-hardened] | [root-mambosu-ultra-performance-hardened] |

          ### SUSFS ඞ + Hardened
          | Variant | Powersave | Balance | Performance | Ultra-Performance |
          |---|---|---|---|---|
          | **KernelSU Next** | [susfs-ksu-next-powersave-hardened] | [susfs-ksu-next-balance-hardened] | [susfs-ksu-next-performance-hardened] | [susfs-ksu-next-ultra-performance-hardened] |
          | **Sukisu** | [susfs-sukisu-powersave-hardened] | [susfs-sukisu-balance-hardened] | [susfs-sukisu-performance-hardened] | [susfs-sukisu-ultra-performance-hardened] |
          | **Sukisu + KPM** | [susfs-sukisu-powersave-kpm-hardened] | [susfs-sukisu-balance-kpm-hardened] | [susfs-sukisu-performance-kpm-hardened] | [susfs-sukisu-ultra-performance-kpm-hardened] |
          | **Resukisu** | [susfs-resukisu-powersave-hardened] | [susfs-resukisu-balance-hardened] | [susfs-resukisu-performance-hardened] | [susfs-resukisu-ultra-performance-hardened] |
          | **Resukisu + KPM** | [susfs-resukisu-powersave-kpm-hardened] | [susfs-resukisu-balance-kpm-hardened] | [susfs-resukisu-performance-kpm-hardened] | [susfs-resukisu-ultra-performance-kpm-hardened] |
          | **Mambosu** | [susfs-mambosu-powersave-hardened] | [susfs-mambosu-balance-hardened] | [susfs-mambosu-performance-hardened] | [susfs-mambosu-ultra-performance-hardened] |

